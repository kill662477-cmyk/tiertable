name: Update MMR Daily

on:
  schedule:
    # 19:00 UTC = 04:00 KST
    - cron: '0 19 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  update-mmr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch records from Supabase
        run: node scripts/fetch-records.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Fetch players.json from monstarznew
        run: node scripts/sync-players.js

      - name: Sync Newcomers (Youth/Returnee)
        run: node scripts/sync-newcomers.js

      - name: Commit player_init_status.json if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/player_init_status.json
          git commit -m "chore: update player init status from players.json" || exit 0
          git push

      - name: Build matches
        run: node scripts/build-matches.js

      - name: Calculate MMR
        run: node scripts/calc-mmr.js

      - name: Publish to Supabase
        run: node scripts/publish-to-supabase.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Sync Eloboard Photos
        run: node scripts/sync-photos.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

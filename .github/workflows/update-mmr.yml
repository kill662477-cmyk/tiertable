name: Update MMR Daily

on:
  schedule:
    # 19:00 UTC = 04:00 KST
    - cron: '0 19 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  update-mmr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch records from Supabase
        run: node scripts/fetch-records.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Fetch players.json from monstarznew
        run: node scripts/sync-players.js

      - name: Build matches
        run: node scripts/build-matches.js

      - name: Calculate MMR
        run: node scripts/calc-mmr.js

      - name: Publish to Supabase
        run: node scripts/publish-to-supabase.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
